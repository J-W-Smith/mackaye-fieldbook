name: Bug report
description: Report a reproducible application defect.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Device, OS, and app version
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed precise locations, private notes, tokens, and personal exports.
          required: true
